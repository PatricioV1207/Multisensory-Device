[platformio]
default_envs = full_prototype

[common]
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DTINY_GSM_MODEM_SIM800
  -DTINY_GSM_RX_BUFFER=1024
  -Wall
  -Wextra
lib_deps =
  adafruit/DHT sensor library@1.4.7
  adafruit/Adafruit Unified Sensor@1.1.15
  mikalhart/TinyGPSPlus@1.1.0
  knolleary/PubSubClient@2.8
  bblanchon/ArduinoJson@7.4.3
  adafruit/Adafruit ADXL345@1.3.4
  pololu/L3G@3.0.0
  adafruit/Adafruit HMC5883 Unified@1.2.3
  adafruit/Adafruit BMP085 Unified@1.1.3
  claws/BH1750@1.3.0
  vshymanskyy/TinyGSM@0.12.0

[env:full_prototype]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags =
  ${common.build_flags}
  -DAPP_MODE=0

[env:test_dht11]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=1

[env:test_gps]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=2

[env:test_i2c_scanner]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=3

[env:test_adxl345]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=4

[env:test_l3g4200d]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=5

[env:test_hmc5883l]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=6

[env:test_bmp180]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=7

[env:calibrate_bmp180]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=11

[env:test_gy801]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=8

[env:test_wifi]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=9

[env:test_mqtt_wifi]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=10

[env:test_payload_json]
platform = native
test_framework = unity
test_build_src = yes
test_filter =
  test_payload_json
  test_validation
lib_deps =
  bblanchon/ArduinoJson@7.4.3
build_flags =
  -std=gnu++17
  -Isrc
build_src_filter =
  -<*>
  +<telemetry/TelemetryBuilder.cpp>
  +<telemetry/TelemetryValidator.cpp>

[env:test_barometer_math]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_barometer_math
build_flags =
  -std=gnu++17
  -Isrc
build_src_filter =
  -<*>
  +<calibration/BarometerMath.cpp>

[env:test_bh1750]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=12

[env:test_microsd]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=13

[env:test_sim800l_at]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=14

[env:test_sim800l_gprs]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=15

[env:test_sim800l_mqtt]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=16

[env:test_sim800l_mqtt_tls]
extends = env:full_prototype
build_flags = ${common.build_flags} -DAPP_MODE=17

[env:test_local_web]
extends = env:full_prototype
board_build.partitions = min_spiffs.csv
build_flags = ${common.build_flags} -DAPP_MODE=18

[env:test_local_ota]
extends = env:full_prototype
board_build.partitions = min_spiffs.csv
build_flags = ${common.build_flags} -DAPP_MODE=19

[env:full_prototype_cellular]
extends = env:full_prototype
board_build.partitions = min_spiffs.csv
build_flags = ${common.build_flags} -DAPP_MODE=20

[env:vehiclesense_wifi]
extends = env:full_prototype
board_build.partitions = min_spiffs.csv
build_flags = ${common.build_flags} -DAPP_MODE=21

[env:test_local_web_json]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_local_web_json
lib_deps =
  bblanchon/ArduinoJson@7.4.3
build_flags =
  -std=gnu++17
  -Isrc
build_src_filter =
  -<*>
  +<web/LocalWebJsonBuilder.cpp>

[env:test_mqtt_topics]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_mqtt_topics
build_flags =
  -std=gnu++17
  -Isrc
build_src_filter =
  -<*>
  +<communication/MqttTopics.cpp>

[env:test_offline_queue]
platform = native
test_framework = unity
test_build_src = no
test_filter = test_offline_queue
build_flags =
  -std=gnu++17
  -Isrc
