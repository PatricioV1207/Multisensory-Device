<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title description">
  <title id="title">VehicleSense</title>
  <desc id="description">Plataforma IoT multisensorial para monitoreo de vehículos</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a33"/>
      <stop offset="0.55" stop-color="#0b3654"/>
      <stop offset="1" stop-color="#087a78"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#20c7d9"/>
      <stop offset="1" stop-color="#52e0a4"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.045"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#00101d" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#54d8cc"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="1058" cy="54" r="155" fill="#26c6da" opacity="0.08"/>
  <circle cx="1160" cy="360" r="185" fill="#52e0a4" opacity="0.06"/>

  <g transform="translate(70 68)">
    <rect width="72" height="72" rx="20" fill="url(#accent)" filter="url(#shadow)"/>
    <path d="M18 44h36l-4-14a8 8 0 0 0-8-6H30a8 8 0 0 0-8 6l-4 14Z" fill="none" stroke="#06243b" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="26" cy="48" r="4" fill="#06243b"/>
    <circle cx="46" cy="48" r="4" fill="#06243b"/>
    <path d="M27 35h18" stroke="#06243b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="70" y="190" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="700" letter-spacing="-2">Vehicle<tspan fill="#3dd7c2">Sense</tspan></text>
  <text x="72" y="234" fill="#cde5ef" font-family="Arial, Helvetica, sans-serif" font-size="24">Plataforma IoT multisensorial para monitoreo de vehículos</text>
  <text x="72" y="274" fill="#8fb8ca" font-family="Arial, Helvetica, sans-serif" font-size="17">Firmware de borde · MQTT/TLS · almacenamiento offline · web local y cloud</text>

  <g transform="translate(70 315)" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">
    <rect width="102" height="38" rx="19" fill="#ffffff" opacity="0.1" stroke="#56d8d0" stroke-opacity="0.45"/>
    <text x="51" y="24" fill="#dff9f6" text-anchor="middle">ESP32</text>
    <rect x="116" width="126" height="38" rx="19" fill="#ffffff" opacity="0.1" stroke="#56d8d0" stroke-opacity="0.45"/>
    <text x="179" y="24" fill="#dff9f6" text-anchor="middle">PlatformIO</text>
    <rect x="256" width="104" height="38" rx="19" fill="#ffffff" opacity="0.1" stroke="#56d8d0" stroke-opacity="0.45"/>
    <text x="308" y="24" fill="#dff9f6" text-anchor="middle">MQTT</text>
    <rect x="374" width="130" height="38" rx="19" fill="#ffffff" opacity="0.1" stroke="#56d8d0" stroke-opacity="0.45"/>
    <text x="439" y="24" fill="#dff9f6" text-anchor="middle">Telemetry v3</text>
  </g>

  <g transform="translate(700 58)" filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect width="425" height="304" rx="26" fill="#071d32" fill-opacity="0.82" stroke="#86eee4" stroke-opacity="0.28"/>
    <text x="30" y="39" fill="#b9d7e5" font-size="14" font-weight="700" letter-spacing="2">FLUJO DE DATOS</text>

    <g transform="translate(145 112)">
      <rect width="138" height="82" rx="18" fill="#0d4460" stroke="#50d9ce" stroke-width="2"/>
      <rect x="43" y="20" width="52" height="31" rx="6" fill="#1c6880" stroke="#8af2e4"/>
      <path d="M35 26h8M35 38h8M35 50h8M95 26h8M95 38h8M95 50h8" stroke="#8af2e4" stroke-width="2"/>
      <text x="69" y="70" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">ESP32 EDGE</text>
    </g>

    <g font-size="13" font-weight="700" text-anchor="middle">
      <rect x="22" y="83" width="96" height="48" rx="12" fill="#123b55" stroke="#2ac7d6"/>
      <text x="70" y="112" fill="#dff9f6">SENSORES</text>
      <rect x="25" y="220" width="90" height="48" rx="12" fill="#123b55" stroke="#2ac7d6"/>
      <text x="70" y="249" fill="#dff9f6">microSD</text>
      <rect x="314" y="82" width="88" height="48" rx="12" fill="#123b55" stroke="#52e0a4"/>
      <text x="358" y="111" fill="#dff9f6">MQTT</text>
      <rect x="308" y="220" width="100" height="48" rx="12" fill="#123b55" stroke="#52e0a4"/>
      <text x="358" y="249" fill="#dff9f6">WEB/API</text>
    </g>

    <g fill="none" stroke="#54d8cc" stroke-width="2.5" marker-end="url(#arrow)">
      <path d="M118 107H145"/>
      <path d="M188 194L113 229"/>
      <path d="M283 126L314 108"/>
      <path d="M283 181L312 226"/>
    </g>

    <g transform="translate(139 238)">
      <path d="M12 22h148l-12-30a13 13 0 0 0-12-8H48a17 17 0 0 0-13 6L12 22Z" transform="translate(0 8)" fill="#0c3650" stroke="#70e7db" stroke-width="2"/>
      <circle cx="43" cy="42" r="10" fill="#071d32" stroke="#70e7db" stroke-width="3"/>
      <circle cx="132" cy="42" r="10" fill="#071d32" stroke="#70e7db" stroke-width="3"/>
    </g>
  </g>
</svg>
